<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Study Completion</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="stylesheet" href="https://unpkg.com/bulma@0.9.3/css/bulma.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style_chat.css') }}">
    <style>
        .container {
            max-width: 600px;
            margin-top: 100px;
        }
        .notification {
            font-size: 1.1em;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="notification is-warning">
        <h1 class="title is-4">Study Completion</h1>
        <div class="content">
            <p>Thank you for your participation. Unfortunately, you did not meet the attention check criteria for this study.</p>

            <p>You will now be redirected back to Prolific. If you are not redirected automatically,
                <a href="https://app.prolific.com/submissions/complete?cc=CBFQQKLT">click here</a>.
            </p>

            <script>
                setTimeout(function() {
                    window.location.href = 'https://app.prolific.com/submissions/complete?cc=CBFQQKLT';
                }, 3000);
            </script>
        </div>
    </div>
</div>

</body>
</html>
